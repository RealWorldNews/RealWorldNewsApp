name: Daily scrape

on:
  schedule:
    - cron: '7 11 * * *'   # 07:07 EDT / 06:07 EST — early morning
    - cron: '7 15 * * *'   # 11:07 EDT / 10:07 EST — late morning (catches Democracy Now after its 8 AM ET broadcast)
  workflow_dispatch:

concurrency:
  group: scrape-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        source:
          - aljazeera
          - bbc
          - borderlandbeat
          - courthousenews
          - democracynow
          - dropsitenews
          - intercept
          - jacobin
          - npr
    name: scrape-${{ matrix.source }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run scraper (${{ matrix.source }})
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          SCRAPE_LIMIT: '15'
        run: npm run scraper:${{ matrix.source }}
